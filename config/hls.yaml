ml:
  readmission_model:
    name: Readmission_Risk_Predictor
    features:
      - age
      - diagnosis_code
      - los_days
      - prior_admissions_12m
      - comorbidity_index
      - sdoh_risk_factors
    algorithm: GradientBoostingClassifier
    target_metric: auc_roc
    target_value: 0.89
  fwa_model:
    name: FWA_Detection_Model
    features:
      - claim_amount
      - provider_history
      - diagnosis_frequency
      - billing_pattern
      - member_risk_score
    algorithm: IsolationForest
    target_metric: precision
    target_value: 0.91

