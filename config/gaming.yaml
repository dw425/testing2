ml:
  churn_model:
    name: Player_Churn_Predictor
    features:
    - days_since_last_login
    - session_frequency_7d
    - purchase_count_30d
    - friend_count
    - skill_rating_delta
    - matches_played_7d
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.91
  fraud_model:
    name: Economy_Fraud_Detector
    features:
    - transaction_velocity
    - gold_delta_1h
    - item_rarity_traded
    - account_age_days
    - ip_change_count
    algorithm: IsolationForest
  ltv_model:
    name: Player_LTV_Predictor
    features:
    - total_spend
    - session_frequency
    - friend_count
    - content_engagement
    - acquisition_source
    algorithm: GradientBoostingRegressor
    target_metric: rmse
    target_value: 8.4
