app:
  name: GamingIQ
  title: Blueprint GamingIQ
  subtitle: "Player Experience, Game Development & Live Ops"
  catalog: gaming_iq
  warehouse_http_path: /sql/1.0/warehouses/<YOUR_WAREHOUSE_ID>
brand:
  primary_color: '#233ED8'
  accent_colors:
    healthy: '#22C55E'
    warning: '#EAB308'
    critical: '#EF4444'
data:
  game_titles:
  - Stellar Conquest
  - Shadow Realms
  - Velocity Rush
  regions:
  - NA-East
  - NA-West
  - EU-West
  - EU-North
  - APAC-SEA
  - APAC-JP
  player_segments:
  - Whale
  - Dolphin
  - Minnow
  - Free-to-Play
  acquisition_channels:
  - Organic
  - Google
  - Meta
  - TikTok
  - Apple
  - Cross-promo
  player_metrics:
    dau: 2400000
    concurrent_peak: 847000
    d1_retention: 0.68
    d7_retention: 0.41
    d30_retention: 0.22
    churn_risk_high: 34200
    ltv_avg: 47.8
    clv_avg: 52.4
    cac_avg: 3.80
  revenue_metrics:
    daily_revenue: 284000
    arpdau: 0.118
    iap_revenue_pct: 0.72
    ad_revenue_pct: 0.18
    subscription_pct: 0.10
    avg_cpm: 8.50
    avg_cpi: 2.30
  ua_metrics:
    avg_roas: 1.52
    campaigns_active: 24
    total_spend_monthly: 420000
  development_metrics:
    milestone_completion_rate: 0.87
    avg_build_time_hours: 4.2
    bug_resolution_rate: 0.94
    user_review_score: 4.3
  live_ops_metrics:
    content_roi_avg: 3.2
    active_events: 3
    events_per_second: 125000
  infrastructure_metrics:
    server_uptime: 0.9995
    mttr_minutes: 12.4
    avg_latency_ms: 28
    time_to_insight_minutes: 4.8
ml:
  churn_model:
    name: Player_Churn_Predictor
    features:
    - days_since_last_login
    - session_frequency_7d
    - purchase_count_30d
    - friend_count
    - skill_rating_delta
    - matches_played_7d
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.91
  fraud_model:
    name: Economy_Fraud_Detector
    features:
    - transaction_velocity
    - gold_delta_1h
    - item_rarity_traded
    - account_age_days
    - ip_change_count
    algorithm: IsolationForest
  ltv_model:
    name: Player_LTV_Predictor
    features:
    - total_spend
    - session_frequency
    - friend_count
    - content_engagement
    - acquisition_source
    algorithm: GradientBoostingRegressor
    target_metric: rmse
    target_value: 8.4
pages:
- id: dashboard
  label: Live Ops Command Center
  icon: fa-gamepad
  enabled: true
- id: player_intel
  label: Player Intelligence
  icon: fa-users
  enabled: true
- id: revenue
  label: Revenue & Monetization
  icon: fa-coins
  enabled: true
- id: ua_growth
  label: User Acquisition & Growth
  icon: fa-rocket
  enabled: true
- id: game_dev
  label: Game Development & Quality
  icon: fa-code-branch
  enabled: true
- id: infrastructure
  label: Infrastructure & Ops
  icon: fa-server
  enabled: true
genie:
  space_name: GamingIQ Genie
  tables:
  - gaming_iq.gold.live_ops_kpis
  - gaming_iq.gold.player_retention_cohorts
  - gaming_iq.gold.economy_health_metrics
  - gaming_iq.gold.matchmaking_fairness
  - gaming_iq.silver.player_telemetry
  - gaming_iq.silver.transaction_log
  sample_questions:
  - What is the average Player LTV by game title and segment?
  - Show me D1, D7, and D30 retention rates by acquisition source.
  - Which UA campaigns have the best ROAS in the last 30 days?
  - What is the current ARPDAU trend across all titles?
  - Which game has the highest content ROI from live events?
  - Show me bug resolution rate and build times by milestone.
  - What are the server uptime percentages by region?
  - Which player segment has the highest churn risk right now?
  - What is the CPI and CPM by acquisition channel?
  - How does battle pass engagement compare across game titles?
dashboard:
  kpis:
  - title: Daily Active Users
    query: SELECT dau FROM gold.live_ops_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: '{:,.0f}'
    value: "2.4M"
    accent: blue
  - title: ARPDAU
    query: SELECT arpdau FROM gold.live_ops_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: '{:.3f}'
    value: "$0.118"
    accent: purple
  - title: D7 Retention
    query: SELECT d7_retention FROM gold.player_retention_cohorts ORDER BY cohort_date DESC LIMIT 1
    format: '{:.0%}'
    value: "41%"
    accent: green
  - title: High Churn Risk
    query: SELECT churn_risk_high FROM gold.live_ops_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: '{:,.0f}'
    value: "34.2K"
    accent: red
    alert: true
