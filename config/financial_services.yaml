ml:
  fraud_model:
    name: Transaction_Fraud_Detector
    features:
    - amount
    - merchant_category
    - time_since_last_txn
    - distance_from_home
    - device_risk_score
    - velocity_1h
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.97
  credit_model:
    name: Credit_Default_Predictor
    features:
    - credit_score
    - dti_ratio
    - employment_years
    - loan_amount
    - payment_history_12m
    - utilization_ratio
    algorithm: GradientBoostingClassifier
    target_metric: auc_roc
    target_value: 0.88
  claims_fraud_model:
    name: Claims_Fraud_Detector
    features:
    - claim_amount
    - claim_frequency
    - provider_pattern
    - policy_age
    - claimant_history
    - geographic_anomaly
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.93
pages:
- id: dashboard
  label: Enterprise Risk Command Center
  icon: fa-building-columns
  enabled: true
- id: banking
  label: Banking Intelligence
  icon: fa-university
  enabled: true
- id: capital_markets
  label: Capital Markets Analytics
  icon: fa-chart-pie
  enabled: true
- id: insurance
  label: Insurance Operations
  icon: fa-shield-halved
  enabled: true
- id: fraud_compliance
  label: Fraud & Compliance Hub
  icon: fa-gavel
  enabled: true
- id: customer
  label: Customer & Distribution
  icon: fa-users
  enabled: true
genie:
  space_name: FinancialServicesIQ Genie
  tables:
  - financial_services_iq.gold.transactions
  - financial_services_iq.gold.customer_profiles
  - financial_services_iq.gold.credit_portfolio
  - financial_services_iq.gold.portfolio_positions
  - financial_services_iq.gold.insurance_policies
  - financial_services_iq.gold.claims
  - financial_services_iq.silver.transaction_raw
  - financial_services_iq.silver.market_data
  sample_questions:
  - What is the transaction fraud detection rate by channel?
  - Show me the credit portfolio delinquency breakdown by loan type.
  - What is the portfolio VaR contribution by asset class?
  - Which insurance product lines have the highest combined ratio?
  - How many AML alerts are open vs resolved this month?
  - What is the customer LTV distribution by segment?
  - Show me claims fraud detection rate by claim type.
  - What is the Sharpe ratio by portfolio over the last quarter?
  - Which distribution channels have the highest policy retention?
  - What is the STP settlement rate trend in capital markets?
dashboard:
  kpis:
  - title: Transactions Today
    query: SELECT transactions_today FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: '{:.1f}M'
    value: "12.5M"
    accent: blue
  - title: Fraud Blocked
    query: SELECT fraud_blocked FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: '{:.0f}'
    value: "847"
    accent: red
    alert: true
  - title: Portfolio VaR (95%)
    query: SELECT var_95_daily FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1
    format: ${:.0f}M
    value: "$47M"
    accent: purple
  - title: Combined Ratio
    query: SELECT combined_ratio FROM gold.insurance_metrics ORDER BY snapshot_time DESC LIMIT 1
    format: '{:.1f}%'
    value: "96.4%"
    accent: green
