app:
  name: FinancialServicesIQ
  title: "Blueprint FinancialServicesIQ"
  subtitle: "Risk & Portfolio Intelligence"
  catalog: financial_services_iq
  warehouse_http_path: "/sql/1.0/warehouses/<YOUR_WAREHOUSE_ID>"

brand:
  primary_color: "#233ED8"
  accent_colors:
    healthy: "#22C55E"
    warning: "#EAB308"
    critical: "#EF4444"

data:
  business_lines: [Retail Banking, Commercial Lending, Wealth Management, Insurance]
  regions: [Northeast, Southeast, Midwest, West Coast, International]
  transaction_channels: [Mobile App, Web Banking, ATM, Branch, Wire Transfer, ACH]
  fraud_detection:
    transactions_per_day: 12500000
    fraud_rate: 0.0023
    blocked_today: 847
    false_positive_rate: 0.004
    avg_fraud_amount: 3420
  credit_risk:
    total_portfolio_value: 8400000000
    avg_credit_score: 714
    delinquency_rate_30d: 0.032
    high_risk_accounts: 12400
    expected_loss_rate: 0.018
  portfolio:
    aum_total: 24500000000
    var_95_daily: 47000000
    sharpe_ratio: 1.42
    beta_portfolio: 0.94
    active_positions: 8450

ml:
  fraud_model:
    name: Transaction_Fraud_Detector
    features: [amount, merchant_category, time_since_last_txn, distance_from_home, device_risk_score, velocity_1h]
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.97
  credit_model:
    name: Credit_Default_Predictor
    features: [credit_score, dti_ratio, employment_years, loan_amount, payment_history_12m, utilization_ratio]
    algorithm: GradientBoostingClassifier
    target_metric: auc_roc
    target_value: 0.88

pages:
  - id: dashboard
    label: "Risk Overview Dashboard"
    icon: fa-building-columns
    enabled: true
  - id: fraud
    label: "Fraud Detection & AML"
    icon: fa-shield-halved
    enabled: true
  - id: credit
    label: "Credit Risk Analytics"
    icon: fa-credit-card
    enabled: true
  - id: portfolio
    label: "Portfolio & Market Risk"
    icon: fa-chart-pie
    enabled: true
  - id: architecture
    label: "Solution Architecture"
    icon: fa-diagram-project
    enabled: true
  - id: details
    label: "Implementation Details"
    icon: fa-code
    enabled: true

genie:
  space_name: "FinancialServicesIQ Genie"
  tables:
    - financial_services_iq.gold.risk_overview_kpis
    - financial_services_iq.gold.fraud_detection_metrics
    - financial_services_iq.gold.credit_risk_portfolio
    - financial_services_iq.gold.portfolio_market_risk
    - financial_services_iq.silver.transaction_anomalies
    - financial_services_iq.silver.credit_default_predictions
  sample_questions:
    - "What is the current fraud detection rate and how does it compare to last month?"
    - "Which merchant category is experiencing the highest fraud velocity right now?"
    - "Show me the credit default probability distribution for our commercial lending book."
    - "Are there any suspicious transaction patterns indicating potential money laundering?"
    - "What is our portfolio's current Value at Risk under stressed market conditions?"
    - "Which customer segment has the fastest growing delinquency rate?"
    - "Predict the expected credit loss for our Q2 loan originations."

dashboard:
  kpis:
    - title: "Transactions Today"
      query: "SELECT transactions_today FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.1f}M"
      value: "12.5M"
      accent: blue
    - title: "Fraud Blocked"
      query: "SELECT fraud_blocked FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.0f}"
      value: "847"
      accent: purple
    - title: "Portfolio VaR (95%)"
      query: "SELECT var_95_daily FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "${:.0f}M"
      value: "$47M"
      accent: green
    - title: "High-Risk Accounts"
      query: "SELECT high_risk_accounts FROM gold.risk_overview_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.1f}K"
      value: "12.4K"
      accent: red
      alert: true
