ml:
  fraud_model:
    name: Transaction_Fraud_Detector
    features:
    - amount
    - merchant_category
    - time_since_last_txn
    - distance_from_home
    - device_risk_score
    - velocity_1h
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.97
  credit_model:
    name: Credit_Default_Predictor
    features:
    - credit_score
    - dti_ratio
    - employment_years
    - loan_amount
    - payment_history_12m
    - utilization_ratio
    algorithm: GradientBoostingClassifier
    target_metric: auc_roc
    target_value: 0.88
  claims_fraud_model:
    name: Claims_Fraud_Detector
    features:
    - claim_amount
    - claim_frequency
    - provider_pattern
    - policy_age
    - claimant_history
    - geographic_anomaly
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.93
