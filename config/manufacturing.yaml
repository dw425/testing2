ml:
  anomaly_detector:
    name: Equipment_Anomaly_Detector
    features:
    - vibration_rms
    - temperature_delta
    - current_draw_amps
    - acoustic_emission_db
    - cycle_time_deviation
    - oil_particulate_count
    algorithm: IsolationForest
    target_metric: f1_score
    target_value: 0.93
  demand_forecaster:
    name: Demand_Forecast_Model
    features:
    - historical_orders_90d
    - seasonal_index
    - customer_backlog
    - economic_indicator
    - lead_time_variability
    - promotion_flag
    algorithm: LightGBMRegressor
    target_metric: mape
    target_value: 6.2
  quality_predictor:
    name: Quality_Defect_Predictor
    features:
    - raw_material_lot_score
    - machine_age_hours
    - ambient_temperature
    - humidity_pct
    - operator_experience_months
    - tool_wear_index
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.89
