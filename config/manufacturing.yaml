app:
  name: ManufacturingIQ
  title: "Blueprint ManufacturingIQ"
  subtitle: "Production Analysis"
  catalog: manufacturing_iq
  warehouse_http_path: "/sql/1.0/warehouses/<YOUR_WAREHOUSE_ID>"

brand:
  primary_color: "#233ED8"
  accent_colors:
    healthy: "#22C55E"
    warning: "#EAB308"
    critical: "#EF4444"

data:
  sites: [Berlin, Detroit, Tokyo]
  machine_types:
    Berlin: [CNC-Milling-BER-01, CNC-Milling-BER-04, Assembly-Arm-BER-07]
    Detroit: [CNC-Line1-DET, Lathe-DET-12, Lathe-DET-14]
    Tokyo: [Mill-C4-TOK, Assembly-Arm-TOK-01, Press-TOK-03]
  telemetry:
    records_per_day: 500000
    anomaly_rate: 0.03
    normal_ranges:
      vibration_hz: [10, 25]
      temp_c: [40, 60]
      spindle_rpm: [800, 1200]
      tool_wear_index: [0.1, 0.5]
      feed_rate: [50, 150]
    anomaly_ranges:
      vibration_hz: [28, 48]
      temp_c: [65, 90]
      spindle_rpm: [1300, 1800]
      tool_wear_index: [0.6, 0.95]
      feed_rate: [160, 300]
  inspections:
    records_per_day: 2854000
    out_of_spec_rate: 0.000005
    spec_range_um: [49.95, 50.05]
    normal_deviation_std: 0.005
    anomaly_deviation_std: 0.08
  inventory:
    components:
      - name: CNC Alloy Block A
        site: Berlin
        stock_days: 14
        status: Healthy
        current_stock: 12400
        daily_usage: 885
      - name: Precision Bearings
        site: Detroit
        stock_days: 3
        status: Low
        current_stock: 2100
        daily_usage: 700
      - name: Sensor Array X-12
        site: Tokyo
        stock_days: 0.5
        status: Critical
        current_stock: 150
        daily_usage: 300
      - name: Titanium Fastener Set
        site: Berlin
        stock_days: 21
        status: Healthy
        current_stock: 18900
        daily_usage: 900
      - name: Hydraulic Actuator B7
        site: Detroit
        stock_days: 7
        status: Healthy
        current_stock: 4900
        daily_usage: 700
      - name: Ceramic Insulator Plate
        site: Tokyo
        stock_days: 2
        status: Low
        current_stock: 800
        daily_usage: 400
  build_tracking:
    batches_per_day: 200
    defect_rate: 0.02
    stations:
      - CNC Milling
      - Lathe Processing
      - Assembly Line A
      - Assembly Line B
      - Quality Check
      - Packaging
    known_batches:
      - batch_id: B-9982-XYZ
        status: Complete
        site: Berlin
      - batch_id: A-1102-MDF
        status: Defect
        defect_flag: "Vibration anomaly detected"
        site: Detroit
      - batch_id: C-4421-ALP
        status: In Progress
        site: Tokyo

ml:
  anomaly_model:
    name: CNC_Tolerance_Anomaly
    features: [vibration_hz, temp_c, spindle_rpm, tool_wear_index, feed_rate]
    algorithm: GradientBoostingClassifier
    target_f1: 0.94
    n_estimators: 200
    max_depth: 5
  forecast_model:
    name: Inventory_Demand_Forecast
    algorithm: Prophet
    horizon_days: 30

pages:
  - id: dashboard
    label: Production Dashboard
    icon: fa-industry
    enabled: true
  - id: inventory
    label: Inventory & Forecasting
    icon: fa-boxes-stacked
    enabled: true
  - id: quality
    label: Quality & Tolerance
    icon: fa-ruler-combined
    enabled: true
  - id: tracking
    label: Real-Time Build Tracking
    icon: fa-bars-progress
    enabled: true
  - id: architecture
    label: System Architecture
    icon: fa-diagram-project
    enabled: true
  - id: details
    label: Implementation Details
    icon: fa-code
    enabled: true

genie:
  space_name: "ManufacturingIQ Genie"
  tables:
    - manufacturing_iq.gold.production_kpis
    - manufacturing_iq.gold.inventory_forecast
    - manufacturing_iq.gold.site_component_status
    - manufacturing_iq.gold.model_health_metrics
    - manufacturing_iq.silver.cnc_anomalies
    - manufacturing_iq.silver.build_tracking
  sample_questions:
    - "Are we on track to meet the Q3 ramp target for the Alpha-9 build?"
    - "Which manufacturing location is currently experiencing the highest tolerance deviation?"
    - "Forecast precision aluminum part shortages across all global sites for the next 30 days."
    - "What is the root cause of the current downtime on the Berlin CNC milling line?"
    - "Show me the real-time build productivity and yield rates for the last 24 hours."
    - "Identify the top 5 stations with recurring micro-stoppages."
    - "How does our current inventory align with the planned delivery pipeline?"

dashboard:
  kpis:
    - title: Model F1-Score
      query: "SELECT model_f1_score FROM gold.production_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.3f}"
      accent: blue
    - title: Inference Latency
      query: "SELECT inference_latency_ms FROM gold.production_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.0f} ms"
      accent: purple
    - title: Data Drift Status
      query: "SELECT data_drift_pct FROM gold.production_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.1f}%"
      accent: green
    - title: Anomalies Detected (1h)
      query: "SELECT anomalies_1h FROM gold.production_kpis ORDER BY snapshot_time DESC LIMIT 1"
      format: "{:.0f}"
      accent: red
      alert: true
