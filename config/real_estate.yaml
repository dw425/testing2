app:
  name: PropIQ
  title: Blueprint PropIQ
  subtitle: "Property Analytics, Portfolio Intelligence & Market Insights"
  catalog: prop_iq
  warehouse_http_path: /sql/1.0/warehouses/<YOUR_WAREHOUSE_ID>
brand:
  primary_color: '#233ED8'
  accent_colors:
    healthy: '#22C55E'
    warning: '#EAB308'
    critical: '#EF4444'
data:
  property_types:
  - Office
  - Retail
  - Industrial
  - Multifamily
  - Mixed-Use
  - Data Center
  markets:
  - New York
  - San Francisco
  - Chicago
  - Austin
  - Miami
  - Seattle
  - Denver
  - Atlanta
  asset_classes:
  - Class A
  - Class B
  - Class C
  investment_strategies:
  - Core
  - Core-Plus
  - Value-Add
  - Opportunistic
  portfolio_metrics:
    portfolio_value: 4200000000
    noi: 285000000
    cap_rate: 0.058
    occupancy_rate: 0.921
    avg_rent_psf: 42.80
    rent_growth_yoy: 0.034
    tenant_retention: 0.82
    leasing_velocity: 14.2
    dscr: 1.45
    ltv: 0.62
    irr_target: 0.142
    operating_expense_ratio: 0.38
    net_effective_rent: 38.50
  market_metrics:
    market_cap_rate: 0.061
    vacancy_rate: 0.128
    absorption_sf: 2840000
    construction_pipeline_sf: 5200000
    rent_growth_market: 0.028
  sustainability_metrics:
    energy_star_score: 78
    leed_certified_pct: 0.42
    carbon_intensity: 8.4
    water_usage_reduction: 0.18
ml:
  valuation_model:
    name: Property_Valuation_Model
    features:
    - location_score
    - building_age
    - rentable_sf
    - occupancy_rate
    - noi_per_sf
    - cap_rate_local
    - recent_comps
    - transit_score
    - crime_index
    - school_rating
    algorithm: GradientBoostingRegressor
    target_metric: mape
    target_value: 4.8
  tenant_churn:
    name: Tenant_Churn_Predictor
    features:
    - lease_term_remaining
    - rent_vs_market
    - tenant_credit_score
    - maintenance_requests
    - renewal_history
    - market_vacancy
    - tenant_industry_health
    - satisfaction_score
    algorithm: XGBClassifier
    target_metric: auc_roc
    target_value: 0.91
  rent_optimizer:
    name: Rent_Optimization_Model
    features:
    - market_rent_psf
    - floor_level
    - view_premium
    - lease_term_years
    - tenant_credit
    - concession_months
    - ti_allowance
    - occupancy_building
    algorithm: LightGBMRegressor
    target_metric: rmse
    target_value: 1.85
